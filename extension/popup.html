<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CC98 Smart Search</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div>
          <div class="eyebrow">CC98 Smart Search</div>
          <h1>搜索增强</h1>
        </div>
        <label class="switch" title="开关插件增强">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </header>

      <section class="section">
        <label class="field">
          <span>模糊程度</span>
          <select id="fuzzyLevel">
            <option value="0">关闭模糊</option>
            <option value="1">保守</option>
            <option value="2">标准</option>
            <option value="3">积极</option>
          </select>
        </label>
      </section>

      <section class="section">
        <label class="field">
          <span>默认排序</span>
          <select id="rankingMode">
            <option value="balanced">综合</option>
            <option value="recent">最新</option>
            <option value="hot">热门</option>
            <option value="custom">自定义权重</option>
          </select>
        </label>
        <label class="field">
          <span>相关性权重</span>
          <input id="relevanceWeight" type="range" min="0" max="100" step="5">
          <output id="relevanceValue"></output>
        </label>
        <label class="field">
          <span>时间权重</span>
          <input id="timeWeight" type="range" min="0" max="100" step="5">
          <output id="timeValue"></output>
        </label>
        <label class="field">
          <span>热度权重</span>
          <input id="hotWeight" type="range" min="0" max="100" step="5">
          <output id="hotValue"></output>
        </label>
      </section>

      <footer class="footer">
        <button id="reset" type="button">恢复默认</button>
        <span id="status">已保存</span>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
